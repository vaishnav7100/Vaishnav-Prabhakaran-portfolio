<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Vaishnav Prabhakaran — Flutter & Mobile App Developer</title>
  <meta name="description"
    content="The page you're looking for doesn't exist. Visit Vaishnav Prabhakaran's portfolio — #1 Flutter & Mobile App Developer in Kerala, Karnataka & Tamil Nadu." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://vaishnavprabhakaran.in/" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #050816;
      --bg-secondary: #0a0f1e;
      --purple: #7C3AED;
      --purple-light: #A78BFA;
      --blue: #3B82F6;
      --cyan: #06B6D4;
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #475569;
      --gradient-primary: linear-gradient(135deg, #7C3AED, #3B82F6);
      --gradient-text: linear-gradient(135deg, #C084FC, #60A5FA, #34D399);
      --border-glass: rgba(255, 255, 255, 0.07);
      --border-glass-hover: rgba(255, 255, 255, 0.14);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.018;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    a { text-decoration: none; color: inherit; }

    ::selection { background: rgba(124, 58, 237, 0.3); color: var(--text-primary); }

    /* ===== BACKGROUND ORBS ===== */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(100px); opacity: 0.25;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.6), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(59,130,246,0.5), transparent 70%); bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(52,211,153,0.35), transparent 70%); top: 50%; left: 60%; animation-delay: -8s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.08); }
      50% { transform: translate(-20px, 25px) scale(0.95); }
      75% { transform: translate(15px, -10px) scale(1.03); }
    }

    /* ===== GRID OVERLAY ===== */
    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== MAIN CONTENT ===== */
    .error-container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 24px;
      max-width: 640px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 404 NUMBER ===== */
    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      background: var(--gradient-text);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 8s ease-in-out infinite;
      position: relative;
      user-select: none;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: var(--gradient-text);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 8s ease-in-out infinite;
      filter: blur(40px);
      opacity: 0.4;
      z-index: -1;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ===== TAG ===== */
    .error-tag {
      display: inline-block;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: var(--purple-light);
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ===== TITLE ===== */
    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    /* ===== DESCRIPTION ===== */
    .error-desc {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===== BUTTONS ===== */
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 50px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn:hover::before { opacity: 1; }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.6);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-glass-hover);
      backdrop-filter: blur(10px);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    /* ===== QUICK LINKS ===== */
    .quick-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.88rem;
      transition: var(--transition);
    }

    .quick-link:hover {
      color: var(--purple-light);
    }

    .quick-link i {
      font-size: 0.75rem;
    }

    /* ===== FLOATING PARTICLES ===== */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: particleDrift linear infinite;
    }

    @keyframes particleDrift {
      0% { opacity: 0; transform: translateY(100vh) scale(0.5); }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-100px) scale(1); }
    }

    /* ===== NAV LOGO ===== */
    .nav-logo-wrapper {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .dot {
      color: var(--purple-light);
      -webkit-text-fill-color: var(--purple-light);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .error-actions { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
      .quick-links { flex-direction: column; align-items: center; gap: 16px; }
    }
  </style>
</head>

<body>
  <!-- Background Effects -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <!-- Nav Logo -->
  <div class="nav-logo-wrapper">
    <a href="/" class="nav-logo">VP<span class="dot">.</span></a>
  </div>

  <!-- Floating Particles -->
  <div class="particle" style="width:3px;height:3px;background:#A78BFA;left:10%;animation-duration:12s;animation-delay:0s;"></div>
  <div class="particle" style="width:2px;height:2px;background:#60A5FA;left:25%;animation-duration:16s;animation-delay:2s;"></div>
  <div class="particle" style="width:4px;height:4px;background:#34D399;left:45%;animation-duration:14s;animation-delay:4s;"></div>
  <div class="particle" style="width:2px;height:2px;background:#A78BFA;left:65%;animation-duration:18s;animation-delay:1s;"></div>
  <div class="particle" style="width:3px;height:3px;background:#60A5FA;left:80%;animation-duration:13s;animation-delay:3s;"></div>
  <div class="particle" style="width:2px;height:2px;background:#34D399;left:90%;animation-duration:15s;animation-delay:5s;"></div>

  <!-- Main Content -->
  <div class="error-container">
    <div class="error-code">404</div>
    <span class="error-tag">Page Not Found</span>
    <h1 class="error-title">Oops! This page doesn't exist.</h1>
    <p class="error-desc">
      The page you're looking for may have been moved or removed. 
      Let's get you back to exploring my portfolio.
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">
        <i class="fas fa-home"></i>
        <span>Back to Home</span>
      </a>
      <a href="/#contact" class="btn btn-ghost">
        <i class="fas fa-envelope"></i>
        <span>Contact Me</span>
      </a>
    </div>
    <div class="quick-links">
      <a href="/#projects" class="quick-link"><i class="fas fa-arrow-right"></i> Projects</a>
      <a href="/#services" class="quick-link"><i class="fas fa-arrow-right"></i> Services</a>
      <a href="/#skills" class="quick-link"><i class="fas fa-arrow-right"></i> Skills</a>
      <a href="/#about" class="quick-link"><i class="fas fa-arrow-right"></i> About</a>
    </div>
  </div>
</body>

</html>
